<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>تولدت مبارک پسر اردیبهشتی</title>

<!-- لینک بوت‌استرپ 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- فونت‌های انگلیسی و فارسی -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Vazirmatn:wght@400;600;700&display=swap" rel="stylesheet">
<!-- فایل CSS -->
<link rel="stylesheet" href="style.css">
</head>

<body class="text-white">

<!-- افکت پلک زدن سینمایی برای انتقال صفحات -->
<div id="eye-top" class="eyelid top"></div>
<div id="eye-bottom" class="eyelid bottom"></div>

<!-- ذرات معلق پس‌زمینه -->
<div class="particles">
  <div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div>
</div>

<!-- لودینگ اولیه با فایل گیف دانلود شده (بدون نیاز به نت) -->
<div id="intro" class="intro d-flex flex-column justify-content-center align-items-center vh-100 vw-100 fixed-top">
  <div class="loading-gif-container">
    <img src="image/tenor.gif" alt="Bubu and Dudu" width="120" style="border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);">
  </div>
  <div class="loading-text persian-text mt-3 fw-bold">در حال آماده‌سازی سورپرایز...</div>
  <div class="progress-bar-custom mt-2">
    <div class="progress-fill"></div>
  </div>
</div>

<!-- صفحه رمز خفن (سایبری + چشم‌های مشکی) -->
<div id="curtain" class="curtain d-flex justify-content-center align-items-center vh-100 vw-100 fixed-top">
  <div class="login-box cyber-panel p-4 p-md-5 mx-3 text-center" id="loginBox">
    
    <!-- دوتا چشم مشکی کیوت بالای صفحه -->
    <div class="login-eyes-container d-flex justify-content-center gap-4 mb-2">
      <div class="black-eye"></div>
      <div class="black-eye"></div>
    </div>

    <!-- آیکون قفل نئونی -->
    <div class="lock-icon-container mb-3 mt-3">
      <svg viewBox="0 0 24 24" class="cyber-lock">
        <path d="M12 17C13.1 17 14 16.1 14 15C14 13.9 13.1 13 12 13C10.9 13 10 13.9 10 15C10 16.1 10.9 17 12 17ZM18 8H17V6C17 3.24 14.76 1 12 1C9.24 1 7 3.24 7 6V8H6C4.9 8 4 8.9 4 10V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V10C20 8.9 19.1 8 18 8ZM8.9 6C8.9 4.29 10.29 2.9 12 2.9C13.71 2.9 15.1 4.29 15.1 6V8H8.9V6ZM18 20H6V10H18V20Z" fill="currentColor"/>
      </svg>
    </div>

    <h2 class="en-text fw-bold text-info mt-2 tracking-wide">SYSTEM LOCKED</h2>
    <p class="hint persian-text mb-4 text-white-50">برای دسترسی به قلبم رمز رو وارد کن...</p>
    
    <!-- باکس‌های ۴ تایی پین‌کد -->
    <div class="pin-container d-flex justify-content-center gap-3 mb-4" dir="ltr">
      <input type="password" maxlength="1" class="pin-box form-control">
      <input type="password" maxlength="1" class="pin-box form-control">
      <input type="password" maxlength="1" class="pin-box form-control">
      <input type="password" maxlength="1" class="pin-box form-control">
    </div>

    <button class="btn cyber-btn persian-text fs-5 fw-bold w-100" onclick="UnlockLetter()">تایید هویت</button>
  </div>
</div>

<!-- پاکت نامه و ستاره های جادویی -->
<div id="envelope-screen" class="d-none d-flex flex-column justify-content-center align-items-center vh-100 w-100 fixed-top" style="z-index: 1000;">
  <div id="magic-stars" class="magic-stars-container"></div>

  <div class="envelope-wrapper" onclick="OpenEnvelope()">
    <div class="envelope">
      <div class="flap"></div>
      <div class="front-left"></div>
      <div class="front-right"></div>
      <div class="front-bottom"></div>
      <div class="inner-paper"></div>
    </div>
    
    <!-- مهر پاکت (چشم متحرک) -->
    <div class="seal wax-seal">
      <svg viewBox="0 0 100 60" class="cute-eye">
        <path d="M 10,20 Q 50,45 90,20" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
        <line x1="20" y1="30" x2="10" y2="45" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
        <line x1="35" y1="38" x2="25" y2="55" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
        <line x1="50" y1="40" x2="50" y2="58" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
        <line x1="65" y1="38" x2="75" y2="55" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
        <line x1="80" y1="30" x2="90" y2="45" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
      </svg>
    </div>
  </div>
  <p class="persian-text mt-5 fs-5 text-white animate-pulse">روی مهر پاکت کلیک کن...</p>
</div>

<!-- نامه اصلی -->
<div id="main" class="main d-none d-flex justify-content-center align-items-center vh-100 w-100 px-3">
  <div class="content-box glass-panel-light p-4 p-md-5 w-100 text-center" style="max-width: 600px;">
    
    <!-- انیمیشن بوبو و دودو با فایل محلی بالای نامه -->
    <div class="bubu-dudu-container d-flex justify-content-center">
      <img src="image/tenor.gif" class="bubu-dudu-gif" alt="Bubu and Dudu">
    </div>

    <h1 class="title persian-text mb-4 mt-2">
      <span class="highlight fw-bold">پسر اردیبهشتی من</span>
    </h1>

    <div class="letter-container " dir="rtl">
      <p id="text" class="persian-text m-0 text-black fw-semibold"></p>
    </div>

    <div id="signature" class="signature d-none persian-text  mt-4" dir="rtl">
      <p class="mb-1 fw-bold fs-5 signature-name">از طرف: نرجس</p>
      <p class="date-text small mb-0 text-muted"></p>
    </div>

  </div>
</div>

<!-- موزیک از سیستم شما خوانده میشود (آهنگ داریوش) -->
<audio id="music" loop>
  <source src="music/Dasthaye-Tou.mp3" type="audio/mpeg">
</audio>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
